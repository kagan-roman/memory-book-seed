# ─────────────────────────────────────────────────────────────────────────────
#  dvory.yml — ШАБЛОН-ЗАГОТОВКА для мини-деревьев семьи (build/build_trees.py).
#
#  ⚠️  Это НЕ реальные люди. Всё ниже — заглушки с плейсхолдерами <ФАМИЛИЯ>,
#      <Имя>, <NN>. Заполните своими данными (book-director ведёт реестр
#      эпитетов синхронно с outline.md). Полная схема — в build/SCHEMA.md.
#
#  Парсер — минимальный (build_trees.py): 2-space отступы, списки `- `,
#  `key: value`, инлайн-списки `[a, b]`, одноуровневые flow-mappings
#  `{ k: v }`. Без YAML-якорей, многострочных скаляров, табов.
# ─────────────────────────────────────────────────────────────────────────────

book:
  # Баннер над листами веток. Подставьте село и год основания/первой записи.
  yard_label: "ДВОРЫ <СЕЛО> · <ГОД>"
  # Нижняя строка-легенда (можно оставить — есть разумный дефолт в движке).
  foot_legend: "золотом — ушедшие на фронт  ·  † убит  ·  БВ без вести  ·  → вернулся  ·  возраст — к началу войны"

# ── ВЕТКИ ────────────────────────────────────────────────────────────────────
# Каждая ветка → build/.out/trees/<slug>_01.html (полный лист ветки).
# layout: prokhor (корень + 2 двора-сына) | anikita (2 колонки по 3 двора)
#         | пусто → одна колонка подряд (универсальный fallback).
branches:

  # ── Ветка A: layout "prokhor" — корневой двор + два двора-сына ────────────
  - slug: branch-a
    founder: "<Имя Основателя> (<ГОД>)"
    title: "ВЕТКА <ИМЯ> · <ГОД>"
    layout: prokhor
    # Необязательный корневой двор во всю ширину (родитель двух дворов ниже).
    root:
      qual: "КОРНЕВОЙ ДВОР · ветка <ИМЯ>"
      head: "<Имя Отчество> <ФАМИЛИЯ> · <NN> г."
      wife: "ж. <Имя Девичья> · <NN> г."
      mutes: "сыновья <Имя> и <Имя> — дворы ниже"
    dvory:
      - name: dvor-a1
        qual: "ДВОР · сын <Имя Отчество>"
        wife: "ж. <Имя> · <NN> г."
        # Двор главы ведёт ветеран-глава семьи (вместо строки head).
        head_vet:
          name: "<Имя Отчество>"
          years: "<NN> г."
          status: died          # lived | died | unknown | back
          chapter: 1            # «гл. N» (необязательно; число или slug)
          epithet: "<краткий псевдоним для чужих глав>"
        members:
          - name: "<Имя Отчество>"
            years: "<NN> г."
            status: back
            chapter: 2
            epithet: "<псевдоним>"
        mutes: "+ <N> дочерей"
      - name: dvor-a2
        qual: "ДВОР · сын <Имя Отчество>"
        wife: "ж. <Имя> · <NN> г."
        head_vet:
          name: "<Имя Отчество>"
          years: "<NN> г."
          status: back
          chapter: 3
          epithet: "<псевдоним>"
        members:
          - name: "<Имя Отчество>"
            years: "<NN> л."
            status: back
            chapter: 4
            epithet: "<псевдоним>"
        mutes: "+ <N> ребёнка"

  # ── Ветка B: layout "anikita" — две колонки по три двора + скобка ─────────
  - slug: branch-b
    founder: "<Имя Основателя> (<ГОД>)"
    title: "ВЕТКА <ИМЯ> · <ГОД>"
    layout: anikita
    # Верхняя скобка: общий предок двух главных дворов (необязательно).
    brace:
      label: "общий прадед — <Имя Отчество> (<ГОД>)"
    # Локальные связи между дворами внутри колонки.
    #   col: L (левая) | R (правая); a/b — индексы дворов в колонке (0..2).
    edges:
      - { col: L, a: 0, b: 1, label: "родные братья" }
      - { col: L, a: 1, b: 2, label: "двоюродные" }
      - { col: R, a: 0, b: 1, label: "отец → сыновья" }
      - { col: R, a: 1, b: 2, label: "родные братья" }
    dvory:
      # Левая колонка (первые 3)
      - name: dvor-b1
        qual: "ДВОР · «<ПРОЗВИЩЕ ДВОРА>»"
        head: "<Имя Отчество> <ФАМИЛИЯ> · <NN> л."
        wife: "ж. <Имя> · <NN> л."
        members:
          - name: "<Имя Отчество>"
            years: "<NN> л."
            status: missing
            chapter: 5
            epithet: "<псевдоним>"
          - name: "<Имя Отчество>"
            years: "<NN> л."
            unknown: true
            note: "нет информации · сноска в гл. 5"
        mutes: "+ <N> дочери"
      - name: dvor-b2
        qual: "ДВОР · брат <Имя Отчество>"
        head: "<Имя Отчество> <ФАМИЛИЯ> · <NN> л."
        wife: "ж. <Имя> · ≈<NN> л."
        members:
          - name: "<Имя Отчество>"
            years: "<NN> л."
            status: died
            chapter: 6
            epithet: "<псевдоним>"
        mutes: "+ <Имя Отчество> · детей нет"
      - name: dvor-b3
        qual: "ВДОВИЙ ДВОР · с <ГОД>"
        head: "<Имя Отчество> · † <ГОД> (до войны)"
        wife: "вдова <Имя> · <NN> л."
        members:
          - name: "<Имя Отчество>"
            years: "≈ <NN> г."
            status: back
            chapter: 7
            epithet: "<псевдоним>"
        mutes: "+ <Имя>, <Имя>"
      # Правая колонка (следующие 3)
      - name: dvor-b4
        qual: "ДВОР · <N> ДЕТЕЙ"
        head: "<Имя Отчество> <ФАМИЛИЯ> · <NN> г."
        wife: "ж. <Имя>"
        members:
          - name: "<Имя Отчество>"
            years: "<NN> г."
            status: missing
            chapter: 8
            epithet: "<псевдоним>"
        mutes: "+ <N> детей · дворы ниже"
      - name: dvor-b5
        qual: "ДВОР · сын <Имя Отчество>"
        wife: "ж. <Имя> · <NN> г."
        head_vet:
          name: "<Имя Отчество>"
          years: "<NN> г."
          status: missing
          chapter: 8
          epithet: "<псевдоним>"
        members:
          - name: "<Имя Отчество>"
            years: "<NN> л."
            status: died
            chapter: 9
            epithet: "<псевдоним>"
        mutes: "+ <N> младших"
      - name: dvor-b6
        qual: "ДВОР · сын <Имя Отчество>"
        wife: "ж. <Имя> · <NN> л."
        head_vet:
          name: "<Имя Отчество>"
          years: "<NN> г."
          status: back
          chapter: 10
          epithet: "<псевдоним>"
        mutes: "+ <Имя>, <Имя>, <Имя>"

# ── МИНИ-ДЕРЕВЬЯ ГЛАВ ────────────────────────────────────────────────────────
# Один блок на slug главы → build/.out/trees/<slug>_00.html (инлайн в зачине).
# focus — герой главы (подсвечивается полосой, БЕЗ псевдонима, dvory §0).
chapter_trees:
  ivan-otchestvo-familiya:
    branch: branch-a
    dvor: dvor-a1
    focus: "<Имя Отчество>"
    banner: "ВЕТКА <ИМЯ> · ДВОР <ИМЯ ОТЧЕСТВО>"
  petr-otchestvo-familiya:
    branch: branch-b
    dvor: dvor-b1
    focus: "<Имя Отчество>"
    banner: "ВЕТКА <ИМЯ> · ДВОР «<ПРОЗВИЩЕ ДВОРА>»"

# ── РЕЕСТР ЭПИТЕТОВ ──────────────────────────────────────────────────────────
# Каждому герою стойкий псевдоним (Учитель, Снайпер, Авиатехник…), чтобы
# в чужих главах ссылаться «эпитет + имя» (CLAUDE.md §16). book-director
# держит этот список синхронно с outline.md.
epithets:
  ivan-otchestvo-familiya: "<Учитель>"
  petr-otchestvo-familiya: "<Снайпер>"
