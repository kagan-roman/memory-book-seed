# ─────────────────────────────────────────────────────────────────────────────
#  book.config.yml — ЕДИНЫЙ источник правды для всей книги.
#
#  Это единственный файл, который нужно заполнить руками (или ответить на
#  вопросы команды /start — она запишет его за вас). Все агенты и все скрипты
#  сборки читают отсюда. Никакого хардкода фамилии/села/путей больше нигде нет.
# ─────────────────────────────────────────────────────────────────────────────

# ── КТО (минимум для запуска: фамилия + село) ────────────────────────────────
subject:
  surname: ""                 # каноническое написание, напр. "Каганов"
  surname_female: ""          # женская форма, напр. "Каганова" (для подписей)
  # Варианты написания в архивах (рукописная кириллица: Г↔Ч/Б/Л, К↔Х, О↔А).
  # /research всегда прогоняет ВСЕ варианты на pamyat-naroda. Пусто = команда
  # /start предложит варианты по правилам из CLAUDE.md, вы подтвердите.
  surname_variants: []        # напр. [Коганов, Кабанов, Качанов, Колганов]
  village: ""                 # село, напр. "Смирново"
  rayon: ""                   # район/округ, напр. "Большеболдинский"
  oblast: ""                  # область/край, напр. "Нижегородская"
  country: "Россия"
  # Дополнительные сёла той же родни (если род жил в нескольких) — необязательно.
  also_villages: []

# ── ОХВАТ ────────────────────────────────────────────────────────────────────
scope:
  surnames: []                # книга про эти фамилии. Пусто = только subject.surname
  include_maternal: false     # включать материнскую линию отдельной частью
  war: "Великая Отечественная война 1941–1945"
  # Источник имён людей: документ (родословная PDF) и/или только архивы.
  start_from_archives_only: false

# ── ИСТОЧНИК-ДОКУМЕНТ (необязательно) ────────────────────────────────────────
# Если есть скан родословной/семейной книги — положите PDF сюда и укажите имя.
# Если нет — оставьте пусто, /research стартует от фамилии+села по архивам.
source_document:
  pdf: ""                     # имя файла внутри sources/  (напр. "rodoslovnaya.pdf")
  description: ""             # что это (год, автор, тип)

# ── АВТОР И ЗАМЫСЕЛ (для раздела «Как эта книга началась») ────────────────────
# ЖЕЛЕЗНОЕ ПРАВИЛО: всё здесь пишет пользователь. Агент НИКОГДА не выдумывает
# биографию автора, мотивы, поездки, чувства. Что не указано — того в книге нет.
author:
  name: ""                    # "Роман Сергеевич Каганов"
  relation: ""                # кем приходится, напр. "правнук одного из ветеранов"
  why: ""                     # зачем эта книга — своими словами автора
  contact_telegram: ""        # @username или ссылка — для уточнений от родни
  contact_email: ""
  # Личные «крючки» для вступления — ТОЛЬКО факты, которые автор сам сообщил.
  # Каждый пункт — дословно. Пусто = вступление будет нейтральным.
  personal_notes: []
  is_writer: false            # false → честная оговорка «я инженер, а не писатель»

# ── ЯЗЫК И ТОН ───────────────────────────────────────────────────────────────
language: ru                  # архивы советские → книга по умолчанию русская
tone: "документальный, тёплый, без пафоса (Алексиевич/Гранин)"

# ── РЕЖИМ РАБОТЫ ─────────────────────────────────────────────────────────────
run:
  mode: staged                # auto = /start гонит весь конвейер сам,
                              # останавливаясь только на гейтах человека;
                              # staged = вы вызываете стадии вручную (/research …)
  depth: standard             # quick | standard | exhaustive
                              #   quick      — по верхам, без глубокого прокликивания
                              #   standard   — основные документы каждого человека
                              #   exhaustive — «прокликать каждую ссылку и страницу»
  parallel_batch: 3           # сколько субагентов разом (3–4; лимиты)
  rebuild_only_on_command: true   # PDF пересобирается ТОЛЬКО по явной команде

# ── КНИГА (заголовок, колонтитулы, обложка) ──────────────────────────────────
book:
  title: ""                   # напр. "КАГАНОВЫ ИЗ СМИРНОВО"
  subtitle: ""                # напр. "Великая Отечественная"
  footer: ""                  # колонтитул карт-листов; пусто = title · subtitle
  cover_image: ""             # имя файла в assets/cover/ (необязательно)
  colophon: ""                # доп. строка выходных данных (пусто = собёрется авто)

# ── ГЕОГРАФИЯ КАРТ ───────────────────────────────────────────────────────────
# Bounding box театра военных действий. build/clip_geo.py скачает Natural Earth
# и обрежет по этому прямоугольнику (объединение всех карт + запас, иначе фон
# «протекает» фейковым морем). Восточный фронт по умолчанию.
geo:
  lon_min: 11.0
  lon_max: 49.0
  lat_min: 44.0
  lat_max: 63.0

# ── ССЫЛКА НА РЕФЕРЕНС-РЕАЛИЗАЦИЮ ────────────────────────────────────────────
# Этот seed — пустой шаблон. Готовая собранная книга-образец (Кагановы из
# Смирново), на которую опирался конвейер:
reference_book_url: "https://github.com/kagan-roman/kniga-pamyati-kaganovykh"
